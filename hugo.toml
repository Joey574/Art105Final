[params]
  exhibitionName = "Costs of Disagreement"
  exhibitionSubtitle = "A somber look on the cost of armed conflict"
  exhibitionDescription = "Part of the human condition we all experience is the inevitable rise of conflict, over the ways resources should be distributed, borders should be drawn, or how others should dress. Whenever different ideas or beliefs come into contact there will always be some manner of disagreement. It is thus quite unfortunate that we so often lack the ability to settle said disagreements in any way other than violence, as throughout history we have turned to armed conflict as our most favored means of resolving our differences. War is a topic more relevant than ever, these past few years we’ve seen a drastic rise in conflicts in the Middle East and in Europe, with these modern conflicts comes the ability to not just harm one another, but also the ability to end the entirety of the human race. It was Albert Einstein who said “I know not with what weapons World War III will be fought, but World War IV will be fought with sticks and stones”. The presence of nuclear weapons has made war an existential threat, and now more than ever it is imperative we find new ways to settle our differences. It is unimaginable the depths of suffering these conflicts, past and present, have caused, though perhaps as human as it is to fight, it is also ingrained into us the ability to endure. Through these depths of suffering and endurance, artists throughout history have made some of the most touching and heart wrenching pieces ever shown. It is these pieces and artists we shall examine in this exhibition, as despite the centuries of time separating them, they all tell a tale so very human."
  exhibitionVenue = "Joey Soroka"
  exhibitionDate = "All the time"
  curatorNote = "Curated by Joey Soroka"
